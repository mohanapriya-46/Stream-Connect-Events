<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(0, 255, 255, 0.2); }
        .input-focus:focus { box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); border-color: #00FFFF; }
    </style>
</head>
<body class="bg-slate-950 flex items-center justify-center min-h-screen overflow-hidden">
    <div class="absolute inset-0 z-0">
        <img src="https://img.freepik.com/free-photo/3d-render-modern-technology-background-with-flowing-lines-floating-particles-design_1048-13620.jpg" class="w-full h-full object-cover opacity-30">
    </div>

    <div class="glass p-10 rounded-3xl w-full max-w-md z-10 shadow-2xl" data-aos="zoom-in">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-cyan-400 tracking-widest uppercase">Admin Login</h1>
            <p class="text-slate-400 text-sm mt-2">Platform Management Access</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='admin-dashboard.html';" class="space-y-6">
            <div>
                <input type="email" placeholder="Admin Email" required class="w-full p-4 bg-slate-900/50 border border-slate-700 rounded-xl text-white input-focus transition-all outline-none">
            </div>
            <div>
                <input type="password" placeholder="Password" required class="w-full p-4 bg-slate-900/50 border border-slate-700 rounded-xl text-white input-focus transition-all outline-none">
            </div>
            <button type="submit" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 text-white font-bold rounded-xl hover:scale-105 transition-transform shadow-lg shadow-cyan-500/20">
                Enter Dashboard
            </button>
        </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
