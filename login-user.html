<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendee Login | Discover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen overflow-hidden">
    <div class="absolute inset-0 z-0">
        <img src="https://cdn.prod.website-files.com/602a043c2c042218db3b0851/689ead21f7a4bf42c8f58362_community%20event%20platform_connection.webp" class="w-full h-full object-cover opacity-50">
    </div>

    <div class="bg-white/10 backdrop-blur-xl p-10 rounded-3xl w-full max-w-md z-10 border border-white/20" data-aos="flip-left">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white">Welcome Back</h1>
            <p class="text-blue-200 text-sm mt-2">Sign in to join live events</p>
        </div>

        <form onsubmit="event.preventDefault(); window.location.href='user-dash.html';" class="space-y-6">
            <input type="email" placeholder="Personal Email" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" placeholder="Password" required class="w-full p-4 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="w-full py-4 bg-white text-blue-900 font-bold rounded-xl hover:bg-blue-50 transition-colors">
                Start Exploring
            </button>
        </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
